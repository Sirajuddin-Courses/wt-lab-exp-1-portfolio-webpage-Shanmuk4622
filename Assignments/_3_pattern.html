<!DOCTYPE HTML>
<html>
    <head>
        <style>
            .container{
                color:red;
                /* background-color: brown; */
                display: grid;
                /* border: 1px solid black; */
                padding: 2px;

                /* margin: auto; */
                grid-template-columns: repeat(5, 60px);
                grid-auto-flow: row;
                grid-gap: 5px;
            }
            .child{
                background-color: aqua;
                text-align: center;
                justify-content: center;
                height: 50px;
                width: 50px;
                padding: 2px;
                margin: 1px;
                border: 1px solid black;
            }
            .brown1{
                background-color: rgb(238, 174, 90);
            }
            .brown2{
                background-color: rgb(241, 123, 12);
            }
            .brown3{
                background-color: rgb(207, 205, 74);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            <div class="child brown3"></div>
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            
            <div class="child brown2"></div>
            <div class="child brown3"></div>
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            <div class="child brown3"></div>

            <div class="child brown3"></div>
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            <div class="child brown3"></div>
            <div class="child brown1"></div>
            
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            <div class="child brown3"></div>
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            
            <div class="child brown2"></div>
            <div class="child brown3"></div>
            <div class="child brown1"></div>
            <div class="child brown2"></div>
            <div class="child brown3"></div>
        </div>
    </body>
</html>
